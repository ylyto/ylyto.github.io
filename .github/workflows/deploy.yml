name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

            - name: Detect build output
        run: |
          echo "Searching for index.html..."
          find . -maxdepth 5 -name index.html -type f | sort

          if [ -f ".output/public/index.html" ]; then
            echo "PUBLISH_DIR=.output/public" >> $GITHUB_ENV
          elif [ -f "dist/index.html" ]; then
            echo "PUBLISH_DIR=dist" >> $GITHUB_ENV
          elif [ -f "dist/client/index.html" ]; then
            echo "PUBLISH_DIR=dist/client" >> $GITHUB_ENV
          elif [ -f "build/index.html" ]; then
            echo "PUBLISH_DIR=build" >> $GITHUB_ENV
          else
            echo "No deployable index.html found."
            echo "Available folders:"
            find . -maxdepth 3 -type d | sort
            exit 1
          fi

      - name: Add SPA fallback
        run: |
          cp "${PUBLISH_DIR}/index.html" "${PUBLISH_DIR}/404.html"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
